<!DOCTYPE html>
<html>
<head>
    <title>DOM and CSS Manipulation Practice</title>
</head>
<body>
    <h1 id="pageTitle">Style Me Dynamically!</h1>
    
    <!-- Button to Toggle Text Color -->
    <button id="toggleTextColorButton">Toggle Text Color</button>
    
    <!-- Div for Changing Border Style -->
    <div id="borderDiv" style="width: 250px; height: 100px; border: 2px solid black; margin: 20px 0;">
        Click to change border style!
    </div>
    
    <!-- Input Field for Setting Font Size -->
    <input type="range" id="fontSizeSlider" min="16" max="48" value="16" />
    <label for="fontSizeSlider">Adjust Font Size</label>
    
    <script>
        // Implement Toggle Text Color functionality
        const toggleTextColorButton = document.getElementById('toggleTextColorButton');
        const pageTitle = document.getElementById('pageTitle');
        toggleTextColorButton.addEventListener('click', () => {
            if (pageTitle.style.color === 'red') {
                pageTitle.style.color = 'black';
            } else {
                pageTitle.style.color = 'red';
            }
        });

        // Implement Border Style Change on Click
        const borderDiv = document.getElementById('borderDiv');
        borderDiv.addEventListener('click', () => {
            if (borderDiv.style.borderStyle === 'solid') {
                borderDiv.style.borderStyle = 'dashed';
            } else {
                borderDiv.style.borderStyle = 'solid';
            }
        });

        // Implement Font Size Adjustment
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        fontSizeSlider.addEventListener('input', () => {
            pageTitle.style.fontSize = `${fontSizeSlider.value}px`;
        });
    </script>
</body>
</html>
