<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      debugger;
      const startingText = "    awdawd      ";
      // GOAL: "AWDAWD"

      function textTrim(text) {
        return text.trim();
      }

      function makeUppercase(text) {
        return text.toUpperCase();
      }

      function textTransform(text) {
       
        // step 1, trim the text
        const trimmedText = textTrim(text);
        // step 2: transform to uppercase
        const uppercaseText = makeUppercase(trimmedText);
        return uppercaseText;
      }

      console.log(textTransform(startingText));
    </script>
  </body>
</html>
